server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/talentflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:talentflow}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false

app:
  seed-demo-data: ${SEED_DEMO_DATA:false}
  upload-dir: ${UPLOAD_DIR:/data/uploads/resumes}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,https://*.vercel.app}

ai:
  enabled: ${AI_ENABLED:true}
  api-key: ${AI_API_KEY:}
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  model: ${AI_MODEL:deepseek-chat}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:60}

logging:
  level:
    root: INFO
    com.recruitment: INFO
