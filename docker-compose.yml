# TalentFlow ATS — 企业级全栈部署（MySQL + Spring Boot + Nginx）
# 用法：cp .env.example .env && 填写 AI_API_KEY && docker compose up -d --build

services:
  mysql:
    image: mysql:8.4
    container_name: talentflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-talentflow_secret}
      MYSQL_DATABASE: talentflow
      MYSQL_USER: talentflow
      MYSQL_PASSWORD: ${DB_PASSWORD:-talentflow_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  backend:
    build: ./backend
    container_name: talentflow-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/talentflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: talentflow
      DB_PASSWORD: ${DB_PASSWORD:-talentflow_secret}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_ENABLED: ${AI_ENABLED:-true}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      UPLOAD_DIR: /data/uploads/resumes
    volumes:
      - upload_data:/data/uploads
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/webapi/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /webapi
    container_name: talentflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  mysql_data:
  upload_data:
